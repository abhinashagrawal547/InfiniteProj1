trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm run typecheck
    displayName: 'TypeScript type check'

  - script: npm run test:ui
    displayName: 'Run WDIO tests'
    env:
      CI: true

  - task: PublishTestResults@2
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/junit-results/*.xml'
      testRunTitle: 'WDIO UI Tests'

  - script: npx allure-commandline@2.34.0 generate allure-results --clean -o allure-report
    condition: always()
    displayName: 'Generate Allure HTML report'

  - task: PublishBuildArtifacts@1
    condition: always()
    inputs:
      pathToPublish: 'allure-report'
      artifactName: 'allure-report'
    displayName: 'Publish Allure report as artifact'