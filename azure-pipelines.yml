trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm run typecheck
    displayName: 'TypeScript type check'

  - script: npm run test:ui
    displayName: 'Run WDIO tests'
    env:
      CI: true

  - task: PublishTestResults@2
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/junit-results/*.xml'
      testRunTitle: 'WDIO UI Tests'

  - script: npx allure-commandline@2.34.0 generate allure-results --clean -o allure-report
    condition: always()
    displayName: 'Generate Allure HTML report'

  - task: PythonScript@0
    condition: always()
    displayName: 'Email Allure report'
    inputs:
      scriptSource: 'inline'
      script: |
        import smtplib
        from email.mime.multipart import MIMEMultipart
        from email.mime.base import MIMEBase
        from email.mime.text import MIMEText
        from email import encoders

        msg = MIMEMultipart()
        msg['From'] = 'your-email@gmail.com'
        msg['To'] = 'abhinashagrawal547@gmail.com'
        msg['Subject'] = 'WDIO Allure Test Report - Build $(Build.BuildNumber)'

        body = 'Allure report attached for build $(Build.BuildNumber).'
        msg.attach(MIMEText(body, 'plain'))

        with open('allure-report.zip', 'rb') as f:
            part = MIMEBase('application', 'octet-stream')
            part.set_payload(f.read())
            encoders.encode_base64(part)
            part.add_header('Content-Disposition', 'attachment; filename=allure-report.zip')
            msg.attach(part)

        server = smtplib.SMTP('smtp.gmail.com', 587)
        server.starttls()
        server.login('abhinashagrawal547@gmail.com', '$(EMAIL_APP_PASSWORD)')
        server.sendmail('abhinashagrawal547@gmail.com', 'abhinashagrawal547@gmail.com', msg.as_string())
        server.quit()

  - task: PublishBuildArtifacts@1
    condition: always()
    inputs:
      pathToPublish: 'allure-report'
      artifactName: 'allure-report'
    displayName: 'Publish Allure report as artifact'